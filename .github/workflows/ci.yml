name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ─── Backend: Lint + Test ───────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: flowstate
          POSTGRES_PASSWORD: flowstate_test
          POSTGRES_DB: flowstate_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          cd backend
          ruff check app/
          ruff format --check app/

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://flowstate:flowstate_test@localhost:5432/flowstate_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test_secret_key
          SPOTIFY_CLIENT_ID: test_client_id
          SPOTIFY_CLIENT_SECRET: test_client_secret
          ENVIRONMENT: test
        run: |
          cd backend
          pytest tests/unit -v --cov=app --cov-report=xml --cov-report=term

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://flowstate:flowstate_test@localhost:5432/flowstate_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test_secret_key
          SPOTIFY_CLIENT_ID: test_client_id
          SPOTIFY_CLIENT_SECRET: test_client_secret
          ENVIRONMENT: test
        run: |
          cd backend
          pytest tests/integration -v

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          file: backend/coverage.xml
          flags: backend

  # ─── Frontend: Lint + Build ─────────────────────────────────────
  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint (ESLint)
        run: |
          cd frontend
          npm run lint

      - name: Type check
        run: |
          cd frontend
          npm run typecheck

      - name: Build
        env:
          VITE_API_URL: http://localhost:8000/api/v1
          VITE_SPOTIFY_CLIENT_ID: test_client_id
        run: |
          cd frontend
          npm run build

      - name: Run tests
        run: |
          cd frontend
          npm run test

  # ─── Docker: Build check ────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t flowstate-backend ./backend

      - name: Build frontend image
        run: docker build -t flowstate-frontend ./frontend
